name: "Response As Code: Pull Playbooks"

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  LOCAL_SYNC_PATH: ${{ vars.LOCAL_SYNC_PATH }}
  SECOPS_CUSTOMER_ID: ${{ vars.SOURCE_SECOPS_CUSTOMER_ID }}
  SECOPS_PROJECT_ID: ${{ vars.SOURCE_SECOPS_PROJECT_ID }}
  SECOPS_REGION: ${{ vars.SOURCE_SECOPS_REGION }}
  SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  pull-playbooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - id: gcp-auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{env.WIF_PROVIDER}}
          service_account: ${{env.SERVICE_ACCOUNT}}
          access_token_lifetime: 900s

      - id: gcp-sdk
        name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: alpha

      - id: install-python
        name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r ./script/requirements.txt
        shell: bash

      - name: Run Python script
        env:
          # Set PYTHONPATH for this specific step
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python ./script/main.py pull-playbooks
        shell: bash

      - name: Fix dubious ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # Check for changes and only commit if there are any
          if ! git diff --staged --quiet; then
            git commit -m "Github Action: Pull Playbooks"
            git push
          else
            echo "No changes to commit."
          fi
